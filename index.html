<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Trade Show Order Capture</title>
<style>
:root{--bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--text:#0f172a;--text2:#475569;--muted:#94a3b8;--primary:#2563eb;--primary-2:#1d4ed8;--warm:#f97316;--border:#e2e8f0;--success:#16a34a}
[data-theme="night"]{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--text:#f1f5f9;--text2:#cbd5e1;--muted:#64748b;--border:#475569}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--text)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.5;min-height:100vh;font-size:15px}
.header{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--border);z-index:100;padding:12px 16px}
.brand{font-weight:700;font-size:18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.icon-btn{width:40px;height:40px;border-radius:10px;background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .15s}
.icon-btn:hover{background:var(--border)}
.search-container{position:relative}
.search-input{width:100%;height:48px;padding:0 56px 0 48px;font-size:16px;border:2px solid var(--border);border-radius:12px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--primary)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.clear-btn{position:absolute;right:56px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:var(--muted);border:none;cursor:pointer;display:none;color:#fff;font-size:14px}
.clear-btn.visible{display:flex;align-items:center;justify-content:center}
.status-line{font-size:12px;color:var(--muted);margin-top:8px;padding-left:4px}
.action-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.action-btn{flex:1;min-width:100px;height:40px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;color:inherit}
.action-btn.primary{background:var(--primary);color:#fff}
.action-btn.primary:hover{background:var(--primary-2)}
.action-btn.secondary{background:var(--bg3);color:var(--text2)}
.action-btn.cart{background:var(--warm);color:#fff;position:relative}
.main{padding:16px;max-width:600px;margin:0 auto}
.import-section{background:var(--bg2);border:2px dashed var(--border);border-radius:16px;padding:28px 16px;text-align:center;margin-bottom:16px}
.import-title{font-weight:600;font-size:16px;margin-bottom:4px}
.import-desc{font-size:13px;color:var(--text2);margin-bottom:12px}
.import-btn{height:40px;padding:0 20px;border-radius:10px;background:var(--primary);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer}
.import-input{display:none}
.empty-state{text-align:center;padding:48px 16px;background:var(--bg2);border-radius:16px;margin-bottom:16px}
.empty-title{font-weight:600;font-size:16px;margin-bottom:6px}
.empty-desc{font-size:13px;color:var(--text2)}
.section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:8px 4px 10px}
.result-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;gap:12px;align-items:center}
.result-info{flex:1;min-width:0}
.result-sku{font-size:11px;font-weight:600;color:var(--primary);font-family:monospace}
.result-title{font-size:14px;font-weight:500;margin:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.result-case{font-size:13px;color:var(--warm);font-weight:600}
.result-price{font-size:13px;font-weight:600}
.result-add{width:40px;height:40px;border-radius:10px;background:var(--primary);color:#fff;border:none;cursor:pointer;font-size:22px;font-weight:700;line-height:1;flex-shrink:0}
.result-add:active{transform:scale(.92)}
.result-add.added{background:var(--success)}
.order-panel{position:fixed;inset:0;background:var(--bg);z-index:200;transform:translateX(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;overflow:hidden;visibility:hidden;opacity:0;transition-property:transform,visibility,opacity}
.order-panel.visible{transform:translateX(0);visibility:visible;opacity:1}
.order-header{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.order-back{width:40px;height:40px;border-radius:10px;background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:18px;flex-shrink:0}
.order-title{font-weight:700;font-size:16px;flex:1}
.order-id-small{font-size:11px;color:var(--muted);font-family:monospace;display:block}
.order-body{flex:1;overflow-y:auto;padding:16px;padding-bottom:140px}
.customer-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:16px}
.form-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px;display:block}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row:last-child{margin-bottom:0}
.form-input{width:100%;height:42px;padding:0 12px;font-size:15px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.form-input:focus{border-color:var(--primary)}
.cart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cart-count{font-size:13px;color:var(--text2);font-weight:600}
.cart-total{font-size:15px;font-weight:700;color:var(--primary)}
.cart-empty{background:var(--bg2);border:1px dashed var(--border);border-radius:14px;padding:32px 16px;text-align:center;color:var(--muted);font-size:13px;margin-bottom:16px}
.cart-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.cart-item-info{flex:1;min-width:0}
.cart-item-sku{font-size:11px;color:var(--primary);font-weight:600;font-family:monospace}
.cart-item-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-meta{font-size:12px;color:var(--text2);margin-top:2px}
.qty-control{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-btn{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:none;cursor:pointer;font-size:18px;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:center;line-height:1}
.qty-btn:hover{background:var(--border)}
.qty-num{min-width:22px;text-align:center;font-weight:700;font-size:14px}
.cart-remove{border:none;background:none;color:#dc2626;cursor:pointer;font-size:12px;padding:4px 8px;border-radius:6px}
.cart-remove:hover{background:#fee2e2}
.order-footer{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;z-index:5;box-shadow:0 -4px 12px rgba(0,0,0,.04)}
.order-footer .fbtn{flex:1;height:46px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer}
.fbtn.ghost{background:var(--bg3);color:var(--text2)}
.fbtn.primary{background:var(--primary);color:#fff}
.fbtn.send{background:var(--warm);color:#fff}
.saved-panel{position:fixed;inset:0;background:var(--bg);z-index:220;transform:translateX(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;visibility:hidden;opacity:0;transition-property:transform,visibility,opacity}
.saved-panel.visible{transform:translateX(0);visibility:visible;opacity:1}
.saved-list{flex:1;overflow-y:auto;padding:0 16px 24px}
.saved-order{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.saved-order-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.saved-order-id{font-weight:700;font-size:13px;font-family:monospace;color:var(--primary)}
.saved-order-date{font-size:11px;color:var(--muted)}
.saved-order-cust{font-size:13px;color:var(--text);margin-bottom:4px}
.saved-order-meta{font-size:12px;color:var(--muted);margin-bottom:10px}
.saved-order-actions{display:flex;gap:8px;flex-wrap:wrap}
.saved-order-btn{flex:1;min-width:90px;height:38px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--text2)}
.saved-order-btn.open{background:var(--primary);color:#fff}
.saved-order-btn.export{background:var(--warm);color:#fff}
.saved-order-btn.danger{background:#dc2626;color:#fff}
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s}
.menu-overlay.visible{opacity:1;pointer-events:auto}
.menu{position:fixed;top:64px;right:16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;z-index:310;min-width:210px;box-shadow:0 10px 30px rgba(0,0,0,.12);overflow:hidden;opacity:0;transform:translateY(-8px) scale(.98);pointer-events:none;transition:all .15s}
.menu.visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.menu-item{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;font-size:14px;border:none;background:none;color:var(--text);width:100%;text-align:left;font-family:inherit}
.menu-item:hover{background:var(--bg3)}
.menu-item.danger{color:#dc2626}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;z-index:600;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.no-results{text-align:center;padding:40px 24px}
@media(min-width:768px){.main{padding:24px 16px}}
</style>
</head>
<body data-theme="day">
<div id="liveRegion" class="sr-only" aria-live="polite"></div>
<header class="header">
  <div class="brand">Trade Show
    <button class="icon-btn" id="settingsBtn" aria-label="Settings" title="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div class="search-container">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" class="search-input" id="searchInput" placeholder="Search by SKU or keyword..." autocomplete="off">
    <button class="clear-btn" id="clearBtn" aria-label="Clear search">&times;</button>
  </div>
  <div class="status-line" id="statusLine">Ready to search</div>
  <div class="action-row">
    <button class="action-btn primary" id="newOrderBtn">New Order</button>
    <button class="action-btn cart" id="cartBtn" style="display:none"><span id="cartCountBadge">0</span> items · $<span id="cartTotalBadge">0.00</span></button>
    <button class="action-btn secondary" id="savedOrdersBtn">Saved</button>
  </div>
</header>
<main class="main" id="mainContent">
  <div class="import-section" id="importSection">
    <div class="import-title">Import Product Catalog</div>
    <div class="import-desc">Upload a CSV file with SKU, title, price, caseQuantity columns</div>
    <button class="import-btn" id="importBtn">Choose File</button>
    <input type="file" class="import-input" id="importInput" accept=".csv,.xlsx,.xls">
  </div>
  <div id="resultsContainer"></div>
</main>
<div class="order-panel" id="orderPanel">
  <div class="order-header">
    <button class="order-back" id="orderBack" aria-label="Back">&larr;</button>
    <div style="flex:1">
      <div class="order-title" id="orderPanelTitle">New Order</div>
      <span class="order-id-small" id="orderPanelId"></span>
    </div>
  </div>
  <div class="order-body" id="orderBody">
    <div id="orderEditMode">
      <div class="customer-card">
        <label class="form-label">Customer Information</label>
        <div class="form-row"><input type="text" class="form-input" id="customerName" placeholder="Name"><input type="text" class="form-input" id="customerCompany" placeholder="Company"></div>
        <div class="form-row"><input type="email" class="form-input" id="customerEmail" placeholder="Email"><input type="tel" class="form-input" id="customerPhone" placeholder="Phone"></div>
      </div>
      <div class="cart-head">
        <span class="form-label" style="margin-bottom:0">Shopping Cart</span>
        <span class="cart-count" id="cartItemCount">0 items</span>
      </div>
      <div id="cartItemsContainer"></div>
      <div class="cart-head" style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
        <span style="font-size:14px;color:var(--text2)">Order total</span>
        <span class="cart-total" id="orderTotal">$0.00</span>
      </div>
    </div>
    <div id="orderSummaryMode" style="display:none">
      <div class="customer-card">
        <div class="form-label">Customer</div>
        <div id="sumCustomerName" style="font-weight:600;font-size:15px;margin-bottom:4px"></div>
        <div id="sumCustomerCompany" style="font-size:13px;color:var(--text2);margin-bottom:4px"></div>
        <div id="sumCustomerEmail" style="font-size:13px;color:var(--muted)"></div>
        <div id="sumCustomerPhone" style="font-size:13px;color:var(--muted)"></div>
      </div>
      <div class="form-label" style="margin-top:8px">Items</div>
      <div id="sumItemsList"></div>
      <div class="cart-head" style="margin-top:14px;padding:12px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)">
        <span style="font-size:14px;color:var(--text2)">Order total</span>
        <span class="cart-total" id="sumTotal">$0.00</span>
      </div>
      <div id="sumStatus" style="text-align:center;font-size:12px;font-weight:600;padding:8px;border-radius:8px;margin-top:12px"></div>
    </div>
  </div>
  <div class="order-footer" id="orderEditFooter">
    <button class="fbtn ghost" id="cancelOrderBtn">Cancel Order</button>
    <button class="fbtn primary" id="proceedOrderBtn" style="flex:2">Done — Add to Orders</button>
  </div>
  <div class="order-footer" id="orderSummaryFooter" style="display:none">
    <button class="fbtn ghost" id="deleteOrderBtn">Delete</button>
    <button class="fbtn primary" id="emailOrderBtn">Email</button>
    <button class="fbtn send" id="exportOrderBtn">Export CSV</button>
  </div>
</div>
<div class="saved-panel" id="savedPanel">
  <div class="order-header">
    <button class="order-back" id="savedBack" aria-label="Back">&larr;</button>
    <div class="order-title">Saved Orders</div>
  </div>
  <div class="main" style="padding-bottom:16px"><input type="text" class="form-input" id="savedSearchInput" placeholder="Search by name, company, or SKU..."></div>
  <div class="saved-list" id="savedList"></div>
</div>
<div class="menu-overlay" id="menuOverlay"></div>
<div class="menu" id="settingsMenu" role="menu">
  <button class="menu-item" id="menuTheme"><span id="themeLabel">Switch to Night mode</span></button>
  <button class="menu-item" id="menuClearCatalog">Clear catalog</button>
  <button class="menu-item" id="menuClearOrders">Clear all orders</button>
  <button class="menu-item danger" id="menuResetAll">Reset everything</button>
</div>
<div class="toast" id="toast"></div>
<script>
const SK={catalog:'ts_catalog_v2',draftOrder:'ts_draft_order_v2',orders:'ts_orders_v2',theme:'ts_theme_v2'};
function loadS(k){try{const d=localStorage.getItem(k);return d?JSON.parse(d):null}catch(e){return null}}
function saveS(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){return false}}
let catalog=loadS(SK.catalog)||[];
let savedOrders=loadS(SK.orders)||[];
let currentOrder=null;
(function(){const t=loadS(SK.theme);if(t&&t.theme)document.body.dataset.theme=t.theme;updateThemeLabel()})();
function genId(){return 'ORD'+Math.random().toString(36).substr(2,6).toUpperCase()}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('visible');clearTimeout(showToast._t);showToast._t=setTimeout(()=>t.classList.remove('visible'),2000)}
function money(n){return '$'+(Number(n)||0).toFixed(2)}
function normProd(p){return{sku:(p.sku||p.SKU||'').toString().trim(),title:(p.title||p.Title||p.name||'').toString().trim(),price:parseFloat(p.price||p.Price||0)||0,caseQuantity:parseInt(p.caseQuantity||p['Case Quantity']||p.case_quantity||'1',10)||1,note:p.note||p.Note||''}}
function searchProducts(q){if(!q.trim())return[];const ql=q.toLowerCase().trim();const scored=catalog.map(p=>({p:p,s:0}));scored.forEach(o=>{const p=o.p,sku=p.sku.toLowerCase(),tt=p.title.toLowerCase();if(sku===ql)o.s+=100;if(tt===ql)o.s+=50;if(sku.startsWith(ql))o.s+=30;if(tt.startsWith(ql))o.s+=15;if(sku.includes(ql))o.s+=8;if(tt.includes(ql))o.s+=4});scored.sort((a,b)=>b.s-a.s);return scored.filter(o=>o.s>0).map(o=>o.p)}
function parseCSVLn(line){const r=[];let c='',inq=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inq&&line[i+1]==='"'){c+='"';i++}else inq=!inq}else if(ch===','&&!inq){r.push(c.trim());c=''}else c+=ch}r.push(c.trim());return r}
function importCatalog(file){const r=new FileReader();r.onload=e=>{try{const txt=e.target.result,lines=txt.split('\n').map(l=>l.trim()).filter(l=>l);if(lines.length<2){showToast('Import failed');return}const headers=parseCSVLn(lines[0]),prods=[];for(let i=1;i<lines.length;i++){const vs=parseCSVLn(lines[i]),p={};headers.forEach((h,idx)=>p[h]=vs[idx]||'');if(p.sku||p.SKU)prods.push(normProd(p))}if(prods.length===0){showToast('No products found');return}catalog=prods;saveS(SK.catalog,catalog);updateImportVis();renderResults();document.getElementById('statusLine').textContent=catalog.length+' items in catalog';showToast('Imported '+catalog.length+' products')}catch(err){console.error(err);showToast('Import failed')}};r.readAsText(file)}
function updateImportVis(){document.getElementById('importSection').style.display=catalog.length===0?'block':'none'}
function renderResults(){const q=document.getElementById('searchInput').value,rc=document.getElementById('resultsContainer');if(catalog.length===0){updateImportVis();rc.innerHTML='';return}if(!q.trim()){rc.innerHTML='<div class="empty-state"><div class="empty-title">Ready to Search</div><div class="empty-desc">Type a SKU or keyword to find products</div></div>';return}const results=searchProducts(q);if(results.length===0){rc.innerHTML='<div class="no-results"><div class="empty-title">No products found</div><div class="empty-desc">Try a different SKU or keyword</div></div>';return}let html='<div class="section-label">'+results.length+' match'+(results.length!==1?'es':'')+'</div>';html+=results.slice(0,50).map(p=>{const inOrder=currentOrder&&currentOrder.items.find(i=>i.sku===p.sku);return '<div class="result-card"><div class="result-info"><div class="result-sku">'+p.sku+'</div><div class="result-title">'+p.title+'</div><div class="result-meta"><span class="result-case">'+p.caseQuantity+'/case</span>'+(p.price?'<span class="result-price">'+money(p.price)+'</span>':'')+'</div></div><button class="result-add '+(inOrder?'added':'')+'" onclick="addToOrder('+JSON.stringify(p.sku).replace(/"/g,'&quot;')+')" aria-label="Add to order">'+(inOrder?'✓':'+')+'</button></div>'}).join('');rc.innerHTML=html}
let isSummaryMode=false;
function newEmptyOrder(){return{id:genId(),customer:{name:'',email:'',phone:'',company:''},items:[],createdAt:Date.now(),status:'draft'}}
function openOrder(existing){
  currentOrder=existing?JSON.parse(JSON.stringify(existing)):newEmptyOrder();
  isSummaryMode=false;
  document.getElementById('orderPanelTitle').textContent='New Order';
  document.getElementById('orderPanelId').textContent='';
  document.getElementById('customerName').value=currentOrder.customer.name||'';
  document.getElementById('customerEmail').value=currentOrder.customer.email||'';
  document.getElementById('customerPhone').value=currentOrder.customer.phone||'';
  document.getElementById('customerCompany').value=currentOrder.customer.company||'';
  document.getElementById('orderEditMode').style.display='block';
  document.getElementById('orderSummaryMode').style.display='none';
  document.getElementById('orderEditFooter').style.display='flex';
  document.getElementById('orderSummaryFooter').style.display='none';
  renderCart();
  document.getElementById('orderPanel').classList.add('visible');
  window.scrollTo(0,0);
}
function openOrderSummary(o){
  currentOrder=JSON.parse(JSON.stringify(o));
  isSummaryMode=true;
  document.getElementById('orderPanelTitle').textContent='Order Summary';
  document.getElementById('orderPanelId').textContent=currentOrder.id;
  document.getElementById('sumCustomerName').textContent=currentOrder.customer.name||'(no name)';
  document.getElementById('sumCustomerCompany').textContent=currentOrder.customer.company||'';
  document.getElementById('sumCustomerEmail').textContent=currentOrder.customer.email||'';
  document.getElementById('sumCustomerPhone').textContent=currentOrder.customer.phone||'';
  let h='';
  if(currentOrder.items&&currentOrder.items.length>0){
    currentOrder.items.forEach(i=>{h+='<div class="cart-item" style="flex-direction:column;align-items:flex-start;gap:6px"><div style="display:flex;justify-content:space-between;width:100%;align-items:baseline"><span class="cart-item-sku" style="font-size:11px;color:var(--primary);font-weight:600;font-family:monospace">'+i.sku+'</span><span style="font-weight:700;font-size:14px">'+money((i.price||0)*i.qty)+'</span></div><div style="font-size:13px;color:var(--text)">'+i.title+'</div><div style="font-size:12px;color:var(--text2)">'+i.qty+' × '+money(i.price)+'/case</div></div>'});
  }else{h='<div class="cart-empty">No items</div>'}
  document.getElementById('sumItemsList').innerHTML=h;
  document.getElementById('sumTotal').textContent=money(currentOrder.items?currentOrder.items.reduce((s,i)=>s+(i.price||0)*i.qty,0):0);
  const st=document.getElementById('sumStatus');
  if(currentOrder.status==='sent'){st.textContent='SENT';st.style.background='var(--warm)';st.style.color='#fff'}else{st.textContent='DRAFT';st.style.background='var(--bg3)';st.style.color='var(--text2)'}
  document.getElementById('orderEditMode').style.display='none';
  document.getElementById('orderSummaryMode').style.display='block';
  document.getElementById('orderEditFooter').style.display='none';
  document.getElementById('orderSummaryFooter').style.display='flex';
  document.getElementById('orderPanel').classList.add('visible');
  window.scrollTo(0,0);
}
function closeOrder(){document.getElementById('orderPanel').classList.remove('visible');isSummaryMode=false}
function proceedOrder(){
  if(!currentOrder){closeOrder();return}
  if(!currentOrder.items||currentOrder.items.length===0){showToast('Add at least one item first');return}
  currentOrder.customer=readCustomerFromForm();
  currentOrder.updatedAt=Date.now();
  currentOrder.status=currentOrder.status||'draft';
  const idx=savedOrders.findIndex(o=>o.id===currentOrder.id);
  if(idx>=0){savedOrders[idx]=JSON.parse(JSON.stringify(currentOrder))}else{savedOrders.unshift(JSON.parse(JSON.stringify(currentOrder)))}
  saveS(SK.orders,savedOrders);
  currentOrder=null;
  updateCartBadge();
  closeOrder();
  renderSaved();
  clearSearch();
  renderResults();
  showToast('Order saved ✓');
}
function cancelCurrentOrder(){if(!currentOrder)return;if(confirm('Clear this order and go back?')){currentOrder=null;updateCartBadge();closeOrder()}}
function deleteCurrentOrder(){if(!currentOrder)return;if(!confirm('Delete this order permanently?'))return;savedOrders=savedOrders.filter(o=>o.id!==currentOrder.id);saveS(SK.orders,savedOrders);currentOrder=null;closeOrder();renderSaved();showToast('Order deleted')}
function emailCurrentOrder(){if(!currentOrder||!currentOrder.customer)return;const c=currentOrder.customer;const subj=encodeURIComponent('Order '+currentOrder.id+(c.name?' from '+c.name:''));const body=encodeURIComponent('Order ID: '+currentOrder.id+'\n'+(c.name?'Customer: '+c.name+'\n':'')+(c.company?'Company: '+c.company+'\n':'')+(c.email?'Email: '+c.email+'\n':'')+(c.phone?'Phone: '+c.phone+'\n':'')+'\nItems:\n'+(currentOrder.items?currentOrder.items.map(i=>i.qty+'x '+i.sku+' '+i.title+' ('+money((i.price||0)*i.qty)+')').join('\n'):'')+'\n\nTotal: '+money(currentOrder.items?currentOrder.items.reduce((s,i)=>s+(i.price||0)*i.qty,0):0));window.open('mailto:'+(c.email||'')+'?subject='+subj+'&body='+body,'_blank');showToast('Opening email client…')}
function addToOrder(sku){if(!currentOrder||isSummaryMode){openOrder(null)}const p=catalog.find(x=>x.sku===sku);if(!p){showToast('Product not found');return}const ex=currentOrder.items.find(i=>i.sku===sku);if(ex)ex.qty+=1;else currentOrder.items.push({sku:p.sku,title:p.title,price:p.price||0,caseQuantity:p.caseQuantity||1,qty:1});renderCart();renderResults();updateCartBadge();showToast('Added: '+p.sku)}
function changeQty(sku,delta){if(!currentOrder)return;const it=currentOrder.items.find(i=>i.sku===sku);if(!it)return;it.qty+=delta;if(it.qty<=0)currentOrder.items=currentOrder.items.filter(i=>i.sku!==sku);renderCart();renderResults();updateCartBadge()}
function removeItem(sku){if(!currentOrder)return;currentOrder.items=currentOrder.items.filter(i=>i.sku!==sku);renderCart();renderResults();updateCartBadge()}
function orderTotal(o){return o.items.reduce((s,i)=>s+(i.price||0)*i.qty,0)}
function updateCartBadge(){const tot=currentOrder?currentOrder.items.reduce((s,i)=>s+i.qty,0):0;const btn=document.getElementById('cartBtn');if(tot>0&&btn){btn.style.display='flex';document.getElementById('cartCountBadge').textContent=tot;document.getElementById('cartTotalBadge').textContent=orderTotal(currentOrder).toFixed(2)}else if(btn)btn.style.display='none'}
function renderCart(){const c=document.getElementById('cartItemsContainer');if(!currentOrder||currentOrder.items.length===0){c.innerHTML='<div class="cart-empty">No items yet. Search and tap + on products to add them.</div>';document.getElementById('cartItemCount').textContent='0 items';document.getElementById('orderTotal').textContent=money(0);return}let h='';currentOrder.items.forEach(i=>{h+='<div class="cart-item"><div class="cart-item-info"><div class="cart-item-sku">'+i.sku+'</div><div class="cart-item-title">'+i.title+'</div><div class="cart-item-meta">'+i.caseQuantity+'/case · '+money(i.price)+' each · subtotal '+money(i.price*i.qty)+'</div></div><div class="qty-control"><button class="qty-btn" onclick="changeQty(\''+i.sku+'\',-1)" aria-label="Decrease">&minus;</button><span class="qty-num">'+i.qty+'</span><button class="qty-btn" onclick="changeQty(\''+i.sku+'\',1)" aria-label="Increase">+</button></div><button class="cart-remove" onclick="removeItem(\''+i.sku+'\')">Remove</button></div>'});c.innerHTML=h;document.getElementById('cartItemCount').textContent=currentOrder.items.reduce((s,i)=>s+i.qty,0)+' items';document.getElementById('orderTotal').textContent=money(orderTotal(currentOrder));updateCartBadge()}
function readCustomerFromForm(){return{name:document.getElementById('customerName').value.trim(),email:document.getElementById('customerEmail').value.trim(),phone:document.getElementById('customerPhone').value.trim(),company:document.getElementById('customerCompany').value.trim()}}
function saveCurrentOrder(asSent){currentOrder.customer=readCustomerFromForm();currentOrder.updatedAt=Date.now();if(asSent)currentOrder.status='sent';else currentOrder.status=currentOrder.status||'draft';const idx=savedOrders.findIndex(o=>o.id===currentOrder.id);if(idx>=0)savedOrders[idx]=JSON.parse(JSON.stringify(currentOrder));else savedOrders.unshift(JSON.parse(JSON.stringify(currentOrder)));saveS(SK.orders,savedOrders);showToast(asSent?'Order sent ✓':'Order saved')}
function openSavedPanel(){document.getElementById('savedPanel').classList.add('visible');renderSaved()}
function closeSavedPanel(){document.getElementById('savedPanel').classList.remove('visible')}
function renderSaved(){const c=document.getElementById('savedList');if(savedOrders.length===0){c.innerHTML='<div class="empty-state" style="margin:16px"><div class="empty-title">No saved orders yet</div><div class="empty-desc">Tap New Order to create one</div></div>';return}c.innerHTML=savedOrders.map((o,i)=>'<div class="saved-order" data-id="'+o.id+'"><div class="saved-order-head"><span class="saved-order-id">'+o.id+'</span><span class="saved-order-date">'+new Date(o.updatedAt||o.createdAt).toLocaleString()+'</span></div><div class="saved-order-cust">'+(o.customer.name||'— no name')+(o.customer.company?' · '+o.customer.company:'')+'</div><div class="saved-order-meta">'+(o.items?o.items.reduce((s,i)=>s+i.qty,0):0)+' items · total '+money(o.items?o.items.reduce((s,i)=>s+i.price*i.qty,0):0)+'</div><div class="saved-order-actions"><button class="saved-order-btn open" data-open="'+i+'">Open</button><button class="saved-order-btn export" data-export="'+i+'">Export CSV</button><button class="saved-order-btn danger" data-delete="'+i+'">Delete</button></div></div>').join('');c.querySelectorAll('[data-open]').forEach(b=>b.addEventListener('click',()=>{const o=savedOrders[parseInt(b.dataset.open,10)];if(o)openOrderSummary(o)}));c.querySelectorAll('[data-export]').forEach(b=>exportOrderByIdx(parseInt(b.dataset.export,10)));c.querySelectorAll('[data-delete]').forEach(b=>b.addEventListener('click',()=>deleteOrderByIdx(parseInt(b.dataset.delete,10))))}
function reopenOrder(id){const o=savedOrders.find(x=>x.id===id);if(!o)return;closeSavedPanel();openOrderSummary(o)}
function exportOrder(id){const o=savedOrders.find(x=>x.id===id);doExport(o)}
function exportOrderByIdx(idx){const o=savedOrders[idx];if(o)doExport(o)}
function doExport(o){if(!o)return;const lines=[['order_id','customer_name','customer_email','customer_phone','customer_company','sku','title','case_quantity','unit_price','quantity','line_total','timestamp']];if(o.items)o.items.forEach(i=>{lines.push([o.id,o.customer.name||'',o.customer.email||'',o.customer.phone||'',o.customer.company||'',i.sku,i.title,i.caseQuantity,i.price||0,i.qty,(i.price||0)*i.qty,new Date(o.updatedAt||o.createdAt).toISOString()])});const csv=lines.map(r=>r.map(c=>'"'+(c===undefined?'':c).toString().replace(/"/g,'""')+'"').join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='order_'+o.id+'_'+Date.now()+'.csv';a.click();URL.revokeObjectURL(url);showToast('CSV exported')}
function deleteOrderByIdx(idx){const o=savedOrders[idx];if(!o)return;if(!confirm('Delete order '+o.id+' permanently?'))return;savedOrders.splice(idx,1);saveS(SK.orders,savedOrders);renderSaved();showToast('Order deleted')}
document.getElementById('searchInput').addEventListener('input',e=>{document.getElementById('clearBtn').classList.toggle('visible',e.target.value.length>0);renderResults()});
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Escape')clearSearch()});
document.getElementById('clearBtn').addEventListener('click',clearSearch);
function clearSearch(){document.getElementById('searchInput').value='';document.getElementById('clearBtn').classList.remove('visible');renderResults()}
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importInput').click());
document.getElementById('importInput').addEventListener('change',e=>{const f=e.target.files[0];if(f){importCatalog(f);e.target.value=''}});
document.getElementById('newOrderBtn').addEventListener('click',()=>openOrder(null));
document.getElementById('cartBtn').addEventListener('click',()=>{if(!currentOrder){currentOrder=newEmptyOrder()}openOrder(currentOrder)});
document.getElementById('orderBack').addEventListener('click',()=>{if(isSummaryMode)closeOrder();else cancelCurrentOrder()});
document.getElementById('cancelOrderBtn').addEventListener('click',cancelCurrentOrder);
document.getElementById('proceedOrderBtn').addEventListener('click',proceedOrder);
document.getElementById('deleteOrderBtn').addEventListener('click',deleteCurrentOrder);
document.getElementById('emailOrderBtn').addEventListener('click',emailCurrentOrder);
document.getElementById('exportOrderBtn').addEventListener('click',()=>{if(currentOrder)doExport(currentOrder)});
document.getElementById('savedOrdersBtn').addEventListener('click',openSavedPanel);
document.getElementById('savedBack').addEventListener('click',closeSavedPanel);
document.getElementById('savedSearchInput').addEventListener('input',e=>{const q=e.target.value.toLowerCase();document.querySelectorAll('.saved-order').forEach(el=>{if(!q){el.style.display='block';return}el.style.display=el.textContent.toLowerCase().includes(q)?'block':'none'})});
const menu=document.getElementById('settingsMenu'),menuOverlay=document.getElementById('menuOverlay');
function openMenu(){menu.classList.add('visible');menuOverlay.classList.add('visible')}
function closeMenu(){menu.classList.remove('visible');menuOverlay.classList.remove('visible')}
document.getElementById('settingsBtn').addEventListener('click',e=>{e.stopPropagation();menu.classList.contains('visible')?closeMenu():openMenu()});
menuOverlay.addEventListener('click',closeMenu);
document.addEventListener('click',e=>{if(!menu.contains(e.target)&&!document.getElementById('settingsBtn').contains(e.target))closeMenu()});
function updateThemeLabel(){const cur=document.body.dataset.theme||'day';document.getElementById('themeLabel').textContent=cur==='night'?'Switch to Day mode':'Switch to Night mode'}
document.getElementById('menuTheme').addEventListener('click',()=>{const cur=document.body.dataset.theme||'day';const next=cur==='night'?'day':'night';document.body.dataset.theme=next;saveS(SK.theme,{theme:next});updateThemeLabel();closeMenu();showToast('Theme: '+next)});
document.getElementById('menuClearCatalog').addEventListener('click',()=>{if(confirm('Clear imported catalog?')){localStorage.removeItem(SK.catalog);catalog=[];updateImportVis();renderResults();document.getElementById('statusLine').textContent='Ready to search';closeMenu();showToast('Catalog cleared')}});
document.getElementById('menuClearOrders').addEventListener('click',()=>{if(confirm('Clear all saved orders?')){localStorage.removeItem(SK.orders);savedOrders=[];renderSaved();closeMenu();showToast('Orders cleared')}});
document.getElementById('menuResetAll').addEventListener('click',()=>{if(confirm('Reset ALL data (catalog, orders, theme)?')){Object.values(SK).forEach(k=>localStorage.removeItem(k));location.reload()}});
window.addToOrder=addToOrder;window.changeQty=changeQty;window.removeItem=removeItem;window.reopenOrder=reopenOrder;window.exportOrder=exportOrder;
(function init(){updateImportVis();renderResults();document.getElementById('statusLine').textContent=catalog.length>0?catalog.length+' items in catalog':'Ready to search';if(catalog.length===0){const sample=[{sku:'DEMO-001',title:'Wireless Bluetooth Earbuds',price:29.99,caseQuantity:12},{sku:'DEMO-002',title:'Portable USB Power Bank',price:19.99,caseQuantity:24},{sku:'DEMO-003',title:'LED Desk Lamp',price:34.99,caseQuantity:18},{sku:'DEMO-004',title:'Ergonomic Laptop Stand',price:49.99,caseQuantity:12},{sku:'DEMO-005',title:'Bluetooth Mechanical Keyboard',price:79.99,caseQuantity:8},{sku:'DEMO-006',title:'USB-C Docking Station',price:89.99,caseQuantity:10}];catalog=sample;saveS(SK.catalog,catalog);document.getElementById('statusLine').textContent='Loaded '+catalog.length+' demo items';renderResults();showToast('Demo catalog loaded — import your own CSV to replace')}})();
</script>
</body>
</html>
